```html
<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sistema de Inventario</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/quagga@0.12.1/dist/quagga.min.js"></script>

</head>

<body class="bg-gray-100">

<div class="flex">

<!-- SIDEBAR -->
<aside class="w-64 bg-gray-800 text-white min-h-screen p-4">

<h2 class="text-xl font-bold mb-6">Inventario</h2>

<ul class="space-y-3">

<li>
<button onclick="showSection('dashboard')" class="w-full text-left">
<i class="fa fa-chart-line mr-2"></i> Dashboard
</button>
</li>

<li>
<button onclick="showSection('inventario')" class="w-full text-left">
<i class="fa fa-box mr-2"></i> Inventario
</button>
</li>

</ul>

</aside>

<!-- MAIN -->
<main class="flex-1 p-6">

<!-- DASHBOARD -->
<section id="dashboard">

<h1 class="text-2xl font-bold mb-6">Panel de Control</h1>

<div class="grid grid-cols-3 gap-4">

<div class="bg-white p-4 shadow rounded">
<h3 class="text-gray-500">Productos</h3>
<p id="totalProductos" class="text-3xl font-bold">0</p>
</div>

<div class="bg-white p-4 shadow rounded">
<h3 class="text-gray-500">Cantidad Total</h3>
<p id="cantidadTotal" class="text-3xl font-bold">0</p>
</div>

</div>

</section>

<!-- INVENTARIO -->
<section id="inventario" class="hidden">

<h1 class="text-2xl font-bold mb-6">Inventario</h1>

<form id="formArticulo" class="bg-white p-4 shadow rounded mb-6 grid grid-cols-4 gap-3">

<input id="codigo" placeholder="Código" class="border p-2 rounded">

<input id="nombre" placeholder="Nombre" class="border p-2 rounded">

<input id="cantidad" type="number" placeholder="Cantidad" class="border p-2 rounded">

<button class="bg-blue-500 text-white rounded">
Guardar
</button>

</form>

<div class="mb-4 flex gap-2">

<button onclick="startScanner()" class="bg-green-500 text-white px-4 py-2 rounded">
<i class="fa fa-barcode"></i> Escanear
</button>

<button onclick="exportCSV()" class="bg-gray-700 text-white px-4 py-2 rounded">
Exportar CSV
</button>

</div>

<div id="scanner" class="mb-4"></div>

<table class="w-full bg-white shadow rounded">

<thead class="bg-gray-200">

<tr>

<th class="p-2">Código</th>
<th class="p-2">Nombre</th>
<th class="p-2">Cantidad</th>
<th class="p-2">Acciones</th>

</tr>

</thead>

<tbody id="tablaInventario"></tbody>

</table>

</section>

</main>

</div>

<script>

const Storage = {

get(key){
return JSON.parse(localStorage.getItem(key) || "[]")
},

set(key,value){
localStorage.setItem(key, JSON.stringify(value))
}

}

let inventario = Storage.get("inventario")

function init(){

renderInventario()
updateStats()

document
.getElementById("formArticulo")
.addEventListener("submit", agregarArticulo)

}

function agregarArticulo(e){

e.preventDefault()

const item = {

id: Date.now(),
codigo: codigo.value,
nombre: nombre.value,
cantidad: Number(cantidad.value)

}

inventario.push(item)

Storage.set("inventario", inventario)

renderInventario()
updateStats()

e.target.reset()

}

function renderInventario(){

const tabla = document.getElementById("tablaInventario")

tabla.innerHTML = ""

inventario.forEach(item=>{

tabla.innerHTML += `
<tr class="border-b">

<td class="p-2">${item.codigo}</td>
<td class="p-2">${item.nombre}</td>
<td class="p-2">${item.cantidad}</td>

<td class="p-2">
<button onclick="eliminar(${item.id})"
class="text-red-500">
<i class="fa fa-trash"></i>
</button>
</td>

</tr>
`

})

}

function eliminar(id){

inventario = inventario.filter(i => i.id !== id)

Storage.set("inventario", inventario)

renderInventario()
updateStats()

}

function updateStats(){

document.getElementById("totalProductos")
.textContent = inventario.length

const total = inventario.reduce((a,b)=>a+b.cantidad,0)

document.getElementById("cantidadTotal")
.textContent = total

}

function showSection(id){

document.querySelectorAll("main section")
.forEach(s => s.classList.add("hidden"))

document.getElementById(id)
.classList.remove("hidden")

}

function exportCSV(){

let csv = "codigo,nombre,cantidad\n"

inventario.forEach(i=>{
csv += `${i.codigo},${i.nombre},${i.cantidad}\n`
})

const blob = new Blob([csv])

const a = document.createElement("a")

a.href = URL.createObjectURL(blob)

a.download = "inventario.csv"

a.click()

}

function startScanner(){

Quagga.init({

inputStream:{
type:"LiveStream",
target:document.querySelector("#scanner")
},

decoder:{
readers:["code_128_reader"]
}

}, err=>{

if(!err) Quagga.start()

})

Quagga.onDetected(result=>{

codigo.value = result.codeResult.code

Quagga.stop()

})

}

document.addEventListener("DOMContentLoaded", init)

</script>

</body>
</html>
