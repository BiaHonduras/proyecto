<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Control de Inventarios</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Favicon -->
    <link rel="icon" href="https://raw.githubusercontent.com/BiaHonduras/proyecto/blob/main/favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script type="module">
        import { supabase, verificarConexion } from './supabase-config.js';
    // Hacer supabase accesible globalmente
        window.supabase = supabase;
        window.verificarConexion = verificarConexion;
    </script>
    
    <style>
        body {
            background: url('https://raw.githubusercontent.com/BiaHonduras/proyecto/aba1871d9b07f98007ef577d78932e28432b0bf0/background.png') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .card {
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .input-field {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }
        
        .input-field:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.4);
        }
        
        .btn-primary {
            background: linear-gradient(45deg, #667eea, #764ba2);
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="container max-w-md mx-auto">
        <div class="card rounded-xl shadow-2xl p-8 text-white">
            <!-- Logo -->
            <div class="text-center mb-8">
                <div class="w-20 h-20 mx-auto mb-4 bg-white/20 rounded-full flex items-center justify-center">
                    <img src="https://raw.githubusercontent.com/BiaHonduras/proyecto/aab31452ef41ac1708e16a0551975df1c2129106/biaNL.png" class="h-12" alt="logo">
                </div>
                <p class="text-white/80">Sistema de Gestión de Inventarios Diarios</p>
            </div>

            <!-- Formulario de Login -->
            <form id="loginForm" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium mb-2">Usuario</label>
                    <input type="text" id="username" 
                           class="input-field w-full px-4 py-3 rounded-lg text-white placeholder-white/60"
                           placeholder="Ingresa tu usuario"
                           required>
                </div>
                
                <div>
                    <label class="block text-sm font-medium mb-2">Contraseña</label>
                    <input type="password" id="password" 
                           class="input-field w-full px-4 py-3 rounded-lg text-white placeholder-white/60"
                           placeholder="Ingresa tu contraseña"
                           required>
                </div>
                
                <button type="submit" 
                        class="btn-primary w-full py-3 rounded-lg font-semibold flex items-center justify-center gap-2">
                    <i class="fas fa-sign-in-alt"></i>
                    Iniciar Sesión
                </button>
            </form>

            <!-- Mensaje de error -->
            <div id="errorMessage" class="mt-4 p-3 bg-red-500/20 border border-red-500/30 rounded-lg text-red-200 hidden">
                <i class="fas fa-exclamation-circle mr-2"></i>
                <span id="errorText"></span>
            </div>

            <!-- Enlace de registro -->
            <div class="text-center mt-6">
                <p class="text-white/70">
                    ¿No recuerdas tu contraseña? 
                    <a href="#" id="registerLink" class="text-white font-semibold hover:underline">
                        Click Aquí
                    </a>
                </p>
            </div>
        </div>
    </div>

<script>
    // Inicializar inventario si no existe
    if (!localStorage.getItem('inventario')) {
        localStorage.setItem('inventario', JSON.stringify([]));
    }

    // Función de login reutilizable
    async function login(usuario, password) {
       
        try {
            const { data, error } = await supabase
                .from('usuarios')
                .select('usuario, nombre_corto, rol')
                .eq('usuario', usuario)
                .eq('contraseña', password)
                .single();
            console.log("Data INDEX: ", data);

            if (error || !data) {
                throw new Error('Usuario o contraseña incorrectos');
            }

            // Guardar sesión
            sessionStorage.setItem('currentUser', JSON.stringify({
                username: data.usuario,
                nombre_corto: data.nombre_corto,
                role: data.rol
            }));

            // Redirigir
            window.location.href = "dashboard.html";

        } catch (err) {
            mostrarError(err.message);
        }
    }

    // Mostrar error en UI
    function mostrarError(mensaje) {
        const errorDiv = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');

        errorText.textContent = mensaje;
        errorDiv.classList.remove('hidden');
    }

    // Evento submit
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const usuario = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();

        if (!usuario || !password) {
            mostrarError('Completa todos los campos');
            return;
        }

        await login(usuario, password);
    });

    // Recuperar contraseña
    document.getElementById('registerLink').addEventListener('click', function(e) {
        e.preventDefault();
        alert('Para restablecer tu clave comunícate con el administrador.');
    });
</script>
    
</body>
</html>
